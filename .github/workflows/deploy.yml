name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # pnpm must be installed BEFORE setup-node so the pnpm store cache resolves.
      # Version is read from package.json "packageManager" (pnpm@11.2.2) so CI uses
      # the SAME pnpm as local + the lockfile — a hard-pinned v9 here failed
      # `pnpm install --frozen-lockfile` against the v11-written lockfile.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Build the web app from the monorepo. The Supabase vars are required by
      # apps/web/src/lib/supabase.ts; the anon key is publishable (RLS-protected),
      # so exposing it in the client bundle is expected and safe. n8n is fully
      # retired — the chatbot now calls the Supabase `chat` Edge Function using
      # VITE_SUPABASE_URL, so no n8n build secret is needed.
      - name: Build web app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm web:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite copies apps/web/public/{CNAME,404.html} into dist, preserving
          # the custom domain and SPA fallback routing.
          path: "apps/web/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
